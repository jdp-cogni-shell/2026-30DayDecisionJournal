{% extends "base.html" %}
{% block title %}Analytics — Decision Journal{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-8">Analytics</h1>

  <!-- Calibration -->
  <div class="bg-white border border-gray-200 rounded-xl p-6 mb-4"
       hx-get="/analytics/calibration"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="text-sm text-gray-400 animate-pulse">Loading calibration...</div>
  </div>

  <!-- Bias Flags -->
  <div class="bg-white border border-gray-200 rounded-xl p-6 mb-4"
       hx-get="/analytics/bias"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="text-sm text-gray-400 animate-pulse">Loading bias flags...</div>
  </div>

  <!-- Pre-mortem Patterns -->
  <div class="bg-white border border-gray-200 rounded-xl p-6 mb-4"
       hx-get="/analytics/premortem"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="text-sm text-gray-400 animate-pulse">Loading patterns...</div>
  </div>

</div>
{% endblock %}
