<form hx-post="/decisions/{{ decision_id }}/updates"
      hx-target="#update-list"
      hx-swap="beforeend"
      hx-on::after-request="this.reset(); document.getElementById('conf-update-display').textContent = '50%'"
      class="border-t border-gray-100 pt-4 space-y-3">

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Source</label>
      <input type="text" name="source" required
             class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="e.g. news article, conversation">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">
        New Confidence: <span id="conf-update-display" class="text-indigo-600 font-semibold">50%</span>
      </label>
      <input type="range" name="confidence_adjusted" min="0" max="100" value="50"
             oninput="document.getElementById('conf-update-display').textContent = this.value + '%'"
             class="w-full accent-indigo-600 mt-1">
    </div>
  </div>

  <div>
    <label class="block text-xs font-medium text-gray-600 mb-1">What happened / new information</label>
    <textarea name="summary" required rows="2"
              class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="Summarise the new data..."></textarea>
  </div>

  <div>
    <label class="block text-xs font-medium text-gray-600 mb-1">Why did your confidence change?</label>
    <textarea name="confidence_rationale" rows="1"
              class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="Optional rationale..."></textarea>
  </div>

  <button type="submit"
          class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-medium px-4 py-2 rounded-lg transition-colors">
    Add Update
  </button>
</form>
