<div class="flex gap-4 py-4 border-t border-gray-100 first:border-0">
  <div class="flex flex-col items-center">
    <div class="w-2 h-2 rounded-full bg-indigo-400 mt-1.5"></div>
    <div class="w-px flex-1 bg-gray-200 mt-1"></div>
  </div>
  <div class="flex-1 pb-2">
    <div class="flex items-center justify-between">
      <span class="text-xs text-gray-400">
        {{ update.created_at.strftime('%b %d, %Y') if update.created_at else '' }} · {{ update.source }}
      </span>
      <span class="text-sm font-bold text-indigo-600">{{ update.confidence_adjusted }}%</span>
    </div>
    <p class="text-sm text-gray-700 mt-1">{{ update.summary }}</p>
    {% if update.confidence_rationale %}
    <p class="text-xs text-gray-400 mt-1 italic">{{ update.confidence_rationale }}</p>
    {% endif %}
  </div>
</div>
