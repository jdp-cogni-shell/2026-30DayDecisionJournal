<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}30 Day Decision Journal{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <a href="/" class="text-lg font-semibold text-gray-900">📓 Decision Journal</a>
      <div class="flex gap-6 text-sm">
        <a href="/" class="text-gray-600 hover:text-gray-900">Dashboard</a>
        <a href="/decisions/new" class="text-gray-600 hover:text-gray-900">New Decision</a>
        <a href="/analytics" class="text-gray-600 hover:text-gray-900">Analytics</a>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
